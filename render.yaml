services:
  - type: web
    name: sql-visual
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: FRONTEND_URL
        value: https://jiwon0524.github.io/sql-visual
      - key: NAVER_CALLBACK_URL
        value: https://sql-visual.onrender.com/api/auth/naver/callback
      - key: CORS_ORIGINS
        value: https://jiwon0524.github.io,http://localhost:5173,http://127.0.0.1:5173
      - key: DATA_FILE
        value: /var/data/sqlvisual-data.json
      - key: SQLITE_FILE
        value: /var/data/sqlvisual-data.sqlite
      - key: STORE_ENGINE
        value: sqlite
      - key: ADMIN_NAVER_IDS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: sqlvisual-data
      mountPath: /var/data
      sizeGB: 1
